<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bakery POS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- LOGIN SECTION -->
    <div id="loginSection" class="auth-container" style="display: flex; justify-content: center; align-items: center; height: 100vh;">
        <div class="card" style="background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 350px;">
            <h2 style="text-align: center; margin-bottom: 20px;">Kitchen Login</h2>
            <input type="email" id="loginEmail" placeholder="Email" style="width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box;">
            <input type="password" id="loginPassword" placeholder="Password" style="width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box;">
            <button id="loginBtn">Login</button>
            <p id="loginError" class="error" style="color: red; font-size: 14px; margin-top: 10px;"></p>
        </div>
    </div>

    <!-- ORDERING SECTION -->
    <div id="orderSection" class="hidden main-wrapper">
        <header class="app-header">
            <div class="logo">Bakery POS</div>
            <div class="header-right">
                <a href="kitchen.html" class="nav-link">BOH View</a>
                <span id="userBadge" style="font-size: 12px; color: #94a3b8;"></span>
                <button id="logoutBtn" class="logout-link">Logout</button>
            </div>
        </header>

        <div class="pos-container">
            <!-- Left Side: Menu -->
            <div class="menu-grid" id="menuGrid"></div>

            <!-- Right Side/Bottom: Cart -->
            <div class="sidebar">
                <div class="sidebar-content">
                    <h3 style="margin-top: 0;">Current Order</h3>
                    <div id="cartItems" class="cart-items">
                        <p id="emptyMsg">Cart is empty</p>
                    </div>
                </div>

                <div class="sidebar-footer">
                    <div class="total-row">
                        <span>Total:</span>
                        <span id="totalPrice">$0.00</span>
                    </div>
                    <button id="checkoutBtn">Send to Kitchen</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
