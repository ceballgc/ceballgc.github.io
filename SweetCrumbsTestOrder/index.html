<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bakery POS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loginSection" class="auth-container">
        <div class="card">
            <h2>Kitchen Login</h2>
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPassword" placeholder="Password">
            <button id="loginBtn">Login</button>
            <p id="loginError" class="error"></p>
        </div>
    </div>

    <div id="orderSection" class="hidden main-wrapper">
        <header class="app-header">
            <div class="logo">Bakery Kitchen</div>
            <div class="header-right">
                <span id="userBadge"></span>
                <button id="logoutBtn" class="logout-link">Logout</button>
            </div>
        </header>

        <div class="pos-container">
            <div class="menu-grid" id="menuGrid"></div>

            <div class="sidebar">
                <div class="sidebar-content">
                    <h3>Current Order</h3>
                    <div id="cartItems" class="cart-items">
                        <p id="emptyMsg">Cart is empty</p>
                    </div>
                </div>

                <div class="sidebar-footer">
                    <div class="total-row">
                        <span>Total:</span>
                        <span id="totalPrice">$0.00</span>
                    </div>
                    <button id="checkoutBtn">Send to Kitchen</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
